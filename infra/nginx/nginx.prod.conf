worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    client_max_body_size 10M;

    upstream api_backend {
        server api:8000;
    }

    # ─── HTTP → HTTPS redirect + ACME challenge ───────────────
    server {
        listen 80 default_server;
        server_name zupperik.dev www.zupperik.dev admin.zupperik.dev;

        # certbot --webroot uses this path for HTTP-01 renewals
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── TMA on zupperik.dev / www.zupperik.dev ────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name zupperik.dev www.zupperik.dev;

        ssl_certificate     /etc/letsencrypt/live/zupperik.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/zupperik.dev/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Smoke endpoint independent of the backend.
        location /internal/health {
            return 200 'nginx-ok\n';
            add_header Content-Type text/plain;
        }

        # Strip /api prefix: /api/feed → backend /feed
        location /api/ {
            proxy_pass         http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Content-hashed build assets — immutable, safe to cache long-term.
        location /assets/ {
            root /var/www/tma;
            try_files $uri =404;
            expires 1y;
        }

        # TMA SPA with client-side routing fallback. index.html stays no-cache
        # so a rebuild's new asset hashes are always fetched — a stale cached
        # index.html points at deleted /assets/ files and breaks the app.
        location / {
            root /var/www/tma;
            try_files $uri $uri/ /index.html;
            expires -1;
        }
    }

    # ─── Admin SPA on admin.zupperik.dev ───────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.zupperik.dev;

        ssl_certificate     /etc/letsencrypt/live/zupperik.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/zupperik.dev/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Content-hashed build assets — immutable, safe to cache long-term.
        location /assets/ {
            root /var/www/admin;
            try_files $uri =404;
            expires 1y;
        }

        # Admin SPA — index.html no-cache (rationale: see TMA block above).
        location / {
            root /var/www/admin;
            try_files $uri $uri/ /index.html;
            expires -1;
        }
    }
}
